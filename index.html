<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời Lễ Tốt Nghiệp</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;500;600;700;800&display=swap');

        /* Đảm bảo căn lề chuẩn trên mọi thiết bị */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #dbeaf7;
            --text-dark: #204169;
            --text-light: #5d748f;
            --white: #ffffff;
            --btn-blue: #2d5580;
            --decor-blue: #abc7e3;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; 
            overflow-y: auto;
            padding: 10px;
        }

        /* ================= CẢNH 1: PHONG THƯ ================= */
        .wrapper {
            position: relative;
            width: 950px;
            max-width: 100%;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope-container {
            position: absolute;
            width: 450px;
            max-width: 95%;
            height: 300px;
            background-color: #c0d8f0;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 10;
            overflow: hidden;
        }

        /* Tạo hình nắp thư */
        .envelope-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom right, transparent 49%, #b1ccee 50%) left / 50% 100% no-repeat,
                        linear-gradient(to bottom left, transparent 49%, #b1ccee 50%) right / 50% 100% no-repeat;
            z-index: 1;
        }
        .envelope-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 150px solid #d0e4f7;
            z-index: 2;
        }

        @media (max-width: 480px) {
            .envelope-container { height: 240px; }
            .envelope-container::after {
                border-left-width: 180px;
                border-right-width: 180px;
                border-top-width: 120px;
            }
        }

        .btn-open {
            position: relative;
            z-index: 5;
            padding: 14px 35px;
            background-color: var(--white);
            color: var(--btn-blue);
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 40px;
        }

        .btn-open:hover {
            transform: translateY(-2px) scale(1.05);
        }

        .envelope-container.hide {
            opacity: 0;
            transform: scale(0.8) translateY(-50px);
            pointer-events: none;
        }

        /* ================= CẢNH 2: THIỆP MỜI CHI TIẾT ================= */
        .card-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            display: flex;
            opacity: 0;
            transform: scale(0.9) translateY(50px);
            pointer-events: none;
            transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s;
            overflow: hidden;
        }

        .card-container.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }

        /* Canvas pháo hoa siêu to khổng lồ chạy bên trong thiệp */
        #fireworks-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .corner-decor {
            position: absolute;
            width: 150px; height: 150px;
            background: radial-gradient(circle at 0 0, #e6f0fa 0%, transparent 70%);
            top: 0; left: 0; z-index: 2;
        }
        .corner-decor.bottom-right {
            top: auto; left: auto; bottom: 0; right: 0;
            background: radial-gradient(circle at 100% 100%, #e6f0fa 0%, transparent 70%);
        }

        .decor-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 2;
        }

        .shape {
            position: absolute;
            background-color: var(--decor-blue);
            opacity: 0.4;
            animation: float-anim 4s infinite ease-in-out alternate;
        }
        .shape.circle { border-radius: 50%; }
        .shape.square { transform: rotate(45deg); }

        .s1 { width: 12px; height: 12px; top: 10%; left: 5%; }
        .s2 { width: 8px; height: 8px; top: 25%; left: 12%; animation-delay: 1s; }
        .s3 { width: 15px; height: 15px; bottom: 15%; left: 8%; animation-delay: 0.5s; }
        .s5 { width: 10px; height: 10px; top: 8%; right: 15%; }
        .s6 { width: 14px; height: 14px; bottom: 20%; right: 5%; animation-delay: 1.2s; }

        @keyframes float-anim {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-10px) rotate(15deg); }
        }

        /* Khung nội dung */
        .card-content {
            display: flex;
            width: 100%;
            height: 100%;
            z-index: 3;
            position: relative;
        }

        /* Phần bên Trái: Khung ảnh Tuấn Anh */
        .card-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px dashed #dbeaf7;
            padding: 30px;
        }

        .photo-frame {
            width: 240px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            background-color: #fff;
            padding: 5px;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .text-group {
            text-align: center;
            position: relative;
            margin-top: -10px;
        }

        .card-left .cursive {
            font-family: 'Dancing Script', cursive;
            font-size: 65px;
            color: var(--text-dark);
            margin: 0;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }

        .card-left .graduation {
            font-size: 30px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: 5px;
            margin: -25px 0 0 0;
        }

        /* Phần bên Phải: Thông tin chữ */
        .card-right {
            flex: 1.3;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .greeting {
            color: var(--text-light);
            font-size: 15px;
            margin-bottom: 5px;
        }

        .invitees {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 15px 0;
            line-height: 1.3;
        }

        .purpose {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 25px;
        }

        .purpose strong {
            color: var(--text-dark);
            font-weight: 700;
        }

        .divider {
            height: 1px;
            border-top: 2px solid #dbeaf7;
            width: 70%;
            margin: 0 auto 25px auto;
        }

        .time-date {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 22px;
            letter-spacing: 1px;
        }

        .location-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 8px 0;
        }

        .location-address {
            font-size: 14px;
            color: var(--text-light);
            margin: 0 0 25px 0;
            line-height: 1.6;
        }

        .thank-you {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 25px;
        }

        .btn-map {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--btn-blue);
            color: var(--white);
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            margin: 0 auto 25px auto;
            width: fit-content;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(45, 85, 128, 0.2);
        }

        .footer-info {
            font-size: 13px;
            color: var(--text-light);
            border-top: 1px dashed #dbeaf7;
            padding-top: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        /* ================= CẤU HÌNH TỐI ƯU RIÊNG CHO ĐIỆN THOẠI (RESPONSIVE) ================= */
        @media (max-width: 768px) {
            .wrapper {
                height: auto;
                min-height: 100vh;
            }

            .card-container {
                position: absolute; /* ĐÃ SỬA: Giữ absolute khi ẩn để không làm tụt phong thư xuống dưới đáy */
                flex-direction: column;
                height: auto;
                width: 100%;
                border-radius: 15px;
            }

            .card-container.show {
                position: relative; /* ĐÃ SỬA: Chỉ chuyển sang relative khi mở ra để vuốt cuộn màn hình mượt mà */
            }

            .card-content {
                flex-direction: column;
            }

            .card-left {
                border-right: none;
                border-bottom: 2px dashed #dbeaf7;
                padding: 35px 20px 25px 20px;
            }

            .photo-frame {
                width: 200px;
                height: 250px;
                margin-bottom: 15px;
            }

            .card-left .cursive {
                font-size: 52px;
            }

            .card-left .graduation {
                font-size: 24px;
                margin-top: -18px;
            }

            .card-right {
                padding: 30px 20px;
            }

            .invitees {
                font-size: 24px;
            }

            .time-date {
                font-size: 19px;
            }

            .location-name {
                font-size: 17px;
            }

            .footer-info {
                flex-direction: column;
                gap: 8px;
                padding-top: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- THẺ NHẠC NỀN -->
    <audio id="bg-music" src="nhacnen.mp3" loop></audio>

    <div class="wrapper">
        <!-- CẢNH 1: PHONG THƯ -->
        <div class="envelope-container" id="envelope">
            <button class="btn-open" id="openBtn">MỞ TẠI ĐÂY</button>
        </div>

        <!-- CẢNH 2: NỘI DUNG THIỆP MỜI -->
        <div class="card-container" id="card">
            
            <!-- CANVAS PHÁO HOA TỰ ĐỘNG BẮN LIÊN TỤC -->
            <canvas id="fireworks-canvas"></canvas>

            <div class="corner-decor"></div>
            <div class="corner-decor bottom-right"></div>
            
            <div class="decor-layer">
                <div class="shape circle s1"></div>
                <div class="shape square s2"></div>
                <div class="shape circle s3"></div>
                <div class="shape square s4"></div>
                <div class="shape circle s5"></div>
                <div class="shape circle s6"></div>
            </div>

            <div class="card-content">
                <div class="card-left">
                    <div class="photo-frame">
                        <img src="vuavl.jpg" alt="Tuấn Anh">
                    </div>
                    <div class="text-group">
                        <h2 class="cursive">Happy</h2></p>
                        <h1 class="graduation">GRADUATION</h1>
                    </div>
                </div>

                <div class="card-right">
                    <p class="greeting">Thân mời</p>
                    <h2 class="invitees">Anh/chị/bạn bè<br>quý mến</h2>
                    <p class="purpose">Đến dự buổi lễ tốt nghiệp của <strong>Tuấn Anh</strong>.</p>
                    
                    <div class="divider"></div>

                    <div class="time-date">13.07.2026 | 10h00</div>

                    <h3 class="location-name">Trường Đại học Nha Trang</h3>
                    <p class="location-address">02 Nguyễn Đình Chiểu, phường Bắc Nha Trang,<br>Khánh Hoà</p>

                    <p class="thank-you">SỰ CÓ MẶT CỦA MỌI NGƯỜI LÀ NIỀM<br>VINH HẠNH CỦA TUẤN ANH</p>

                    <a href="https://maps.google.com" target="_blank" class="btn-map">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        Xem đường đi
                    </a>

                    <div class="footer-info">
                        <span>ZL: Nguyễn Tuấn Anh</span>
                        <span>SĐT: 0702340724</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CODE SCRIPT XỬ LÝ PHÁO HOA SIÊU TO & PHÁT NHẠC -->
    <script>
        const openBtn = document.getElementById('openBtn');
        const envelope = document.getElementById('envelope');
        const card = document.getElementById('card');
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bg-music');

        let particles = [];
        let isCardOpen = false;

        function resizeCanvas() {
            if (card) {
                canvas.width = card.offsetWidth;
                canvas.height = card.offsetHeight;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        class FireworkSpark {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                
                const speed = Math.random() * 8 + 3; 
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.gravity = 0.1;
                this.friction = 0.965;
                this.alpha = 1;
                
                this.decay = Math.random() * 0.012 + 0.008; 
                this.size = Math.random() * 3.5 + 2.5; 
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                ctx.shadowBlur = 18;
                ctx.shadowColor = this.color;
                
                ctx.fill();
                ctx.restore();
            }
        }

        function createFireworkBurst(x, y) {
            const fireworkColors = ['#ffd700', '#ff007f', '#00d2ff', '#00ff87', '#a100ff', '#ff5e00', '#ffffff'];
            const chosenColor = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
            
            const sparkCount = 100; 
            for (let i = 0; i < sparkCount; i++) {
                particles.push(new FireworkSpark(x, y, chosenColor));
            }
        }

        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const spark = particles[i];
                spark.update();
                spark.draw();
                if (spark.alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(renderLoop);
        }

        function startContinuousFireworks() {
            if (!isCardOpen) return;

            let minX, maxX, minY, maxY;

            if (window.innerWidth <= 768) {
                minX = 60;
                maxX = canvas.width - 60;
                minY = 60;
                maxY = canvas.height - 120;
            } else {
                minX = canvas.width * 0.4;
                maxX = canvas.width - 60;
                minY = 60;
                maxY = canvas.height * 0.6;
            }

            const randomX = Math.random() * (maxX - minX) + minX;
            const randomY = Math.random() * (maxY - minY) + minY;

            createFireworkBurst(randomX, randomY);

            const nextFireTime = Math.random() * 1100 + 700;
            setTimeout(startContinuousFireworks, nextFireTime);
        }

        // Bấm mở phong thư
        openBtn.addEventListener('click', () => {
            envelope.classList.add('hide');
            card.classList.add('show');
            isCardOpen = true;

            setTimeout(() => {
                resizeCanvas();
                createFireworkBurst(canvas.width / 2, canvas.height / 3);
                startContinuousFireworks();
            }, 350);

            bgMusic.play().catch(err => console.log("Yêu cầu tương tác phát nhạc:", err));

            renderLoop();
        });
    </script>
</body>
</html>
